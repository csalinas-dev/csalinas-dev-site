name: Deploy csalinas.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, sfo3-02]

    defaults:
      run:
        working-directory: /srv/sites/csalinas.dev/_/app

    steps:
      - name: Update repository in place
        run: |
          git fetch origin
          git checkout main
          git reset --hard ${{ github.sha }}

      - name: Build and (re)start containers
        run: docker compose up -d --build app

      - name: Prune dangling images
        run: docker image prune -f
